<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户管理系统</title>
  <!-- 固定引入，无重复、无报错 -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <!-- 所有内容必须放在#app内，Vue才会编译 -->
  <div id="app">
    <!-- 登录区域 -->
    <div v-if="!session" class="max-w-md mx-auto mt-20 p-6 border rounded-lg shadow">
      <h2 class="text-2xl font-bold mb-6 text-center">客户管理系统登录</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">邮箱</label>
          <input v-model="loginForm.email" type="email" class="w-full border rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">密码</label>
          <input v-model="loginForm.password" type="password" class="w-full border rounded px-3 py-2">
        </div>
        <button @click="handleLogin" :disabled="loading" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 disabled:bg-blue-300">
          {{ loading ? '登录中...' : '登录' }}
        </button>
        <p v-if="errorMsg" class="text-red-500 text-sm text-center">{{ errorMsg }}</p>
      </div>
    </div>

    <!-- 登录后的主界面 -->
    <div v-else class="max-w-6xl mx-auto p-6">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">客户管理系统</h1>
        <div class="flex items-center gap-4">
          <span>{{ session.user.email }}</span>
          <button @click="handleLogout" class="text-red-600 hover:underline">退出</button>
        </div>
      </div>

      <!-- 搜索+新增按钮 -->
      <div class="flex gap-4 mb-6">
        <input v-model="searchQuery" placeholder="搜索客户姓名或电话..." class="flex-1 border rounded px-3 py-2">
        <button @click="openModal()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">+ 新增客户</button>
      </div>

      <!-- 客户列表表格 -->
      <div class="border rounded-lg overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="text-left py-3 px-4">姓名</th>
              <th class="text-left py-3 px-4">电话</th>
              <th class="text-left py-3 px-4">状态</th>
              <th class="text-left py-3 px-4">操作</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="item in filteredList" :key="item.id" class="border-b">
              <td class="py-3 px-4">{{ item.name }}</td>
              <td class="py-3 px-4">{{ item.phone }}</td>
              <td class="py-3 px-4">{{ item.status === 'active' ? '活跃' : '停用' }}</td>
              <td class="py-3 px-4 flex gap-3">
                <button @click="openModal(item)" class="text-blue-600 hover:underline">编辑</button>
                <button @click="handleDelete(item)" class="text-red-600 hover:underline">删除</button>
              </td>
            </tr>
            <tr v-if="filteredList.length === 0">
              <td colspan="4" class="py-8 text-center text-gray-500">暂无数据</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 新增/编辑弹窗 -->
      <div v-if="isModalOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg p-6 w-full max-w-md">
          <h3 class="text-xl font-bold mb-4">{{ editingItem ? '编辑客户' : '新增客户' }}</h3>
          <div class="space-y-4 mb-6">
            <div>
              <label class="block text-sm font-medium mb-1">姓名</label>
              <input v-model="form.name" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">电话</label>
              <input v-model="form.phone" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">状态</label>
              <select v-model="form.status" class="w-full border rounded px-3 py-2">
                <option value="active">活跃</option>
                <option value="inactive">停用</option>
              </select>
            </div>
          </div>
          <div class="flex gap-3 justify-end">
            <button @click="isModalOpen = false" class="border px-4 py-2 rounded hover:bg-gray-50">取消</button>
            <button @click="handleSave" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">保存</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 纯浏览器兼容JS，无任何CommonJS语法，彻底解决module报错 -->
  <script>
    // 解构Vue API
    const { createApp, ref, computed, onMounted } = Vue;

    // Supabase 配置（和你之前的一致）
    const SUPABASE_URL = 'https://ylxzrpwqvlijpvschhgj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlseHpycHdxdmxpanB2c2NoaGdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTI4ODMsImV4cCI6MjA5MDgyODg4M30.AlBACmZHSzYHtCfpqRQbyxOIGUZV_tuClur8DJjSiFY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 创建Vue应用
    createApp({
      setup() {
        // 登录状态
        const session = ref(null);
        const loading = ref(false);
        const errorMsg = ref('');
        const loginForm = ref({ email: '', password: '' });
        
        // 客户数据
        const customers = ref([]);
        const searchQuery = ref('');
        
        // 弹窗状态
        const isModalOpen = ref(false);
        const editingItem = ref(null);
        const form = ref({ name: '', phone: '', status: 'active' });

        // 搜索过滤
        const filteredList = computed(() => {
          if (!searchQuery.value) return customers.value;
          const q = searchQuery.value.toLowerCase();
          return customers.value.filter(c => 
            c.name.toLowerCase().includes(q) || c.phone.includes(q)
          );
        });

        // 初始化登录检查
        onMounted(async () => {
          console.log('Vue 挂载成功');
          const { data: { session: currentSession } } = await supabase.auth.getSession();
          session.value = currentSession;
          if (currentSession) fetchData();

          // 监听登录状态变化
          supabase.auth.onAuthStateChange((_event, _session) => {
            session.value = _session;
            if (_session) fetchData();
          });
        });

        // 登录方法
        const handleLogin = async () => {
          loading.value = true;
          errorMsg.value = '';
          const { error } = await supabase.auth.signInWithPassword(loginForm.value);
          if (error) errorMsg.value = error.message;
          loading.value = false;
        };

        // 退出登录
        const handleLogout = async () => {
          await supabase.auth.signOut();
          customers.value = [];
        };

        // 获取客户列表
        const fetchData = async () => {
          const { data, error } = await supabase
            .from('customers')
            .select('*')
            .order('created_at', { ascending: false });
          if (error) console.error('数据获取失败：', error);
          customers.value = data || [];
        };

        // 打开弹窗
        const openModal = (item = null) => {
          editingItem.value = item;
          form.value = item ? { ...item } : { name: '', phone: '', status: 'active' };
          isModalOpen.value = true;
        };

        // 保存客户数据
        const handleSave = async () => {
          let error = null;
          if (editingItem.value) {
            // 编辑更新
            const res = await supabase
              .from('customers')
              .update(form.value)
              .eq('id', editingItem.value.id);
            error = res.error;
          } else {
            // 新增插入
            const res = await supabase
              .from('customers')
              .insert([form.value]);
            error = res.error;
          }
          if (error) {
            console.error('保存失败：', error);
            alert('保存失败：' + error.message);
            return;
          }
          // 保存成功，关闭弹窗刷新列表
          isModalOpen.value = false;
          fetchData();
        };

        // 删除客户
        const handleDelete = async (item) => {
          if (!confirm(`确定要删除 ${item.name} 吗？`)) return;
          const { error } = await supabase.from('customers').delete().eq('id', item.id);
          if (error) {
            console.error('删除失败：', error);
            alert('删除失败：' + error.message);
            return;
          }
          fetchData();
        };

        return {
          session, loading, errorMsg, loginForm,
          customers, searchQuery, filteredList,
          isModalOpen, editingItem, form,
          handleLogin, handleLogout, openModal, handleSave, handleDelete
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
