<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理系统</title>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 简单的样式 (Tailwind CSS CDN 为了好看) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<div id="app" class="max-w-6xl mx-auto p-6">
    
    <!-- 1. 登录界面 -->
    <div v-if="!session" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center">系统登录</h2>
            <div class="space-y-4">
                <input v-model="loginForm.email" type="email" placeholder="邮箱" class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input v-model="loginForm.password" type="password" placeholder="密码" class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button @click="handleLogin" :disabled="loading" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 disabled:opacity-50">
                    {{ loading ? '登录中...' : '登录' }}
                </button>
                <p v-if="errorMsg" class="text-red-500 text-sm text-center">{{ errorMsg }}</p>
            </div>
        </div>
    </div>

    <!-- 2. 管理后台界面 -->
    <div v-else class="space-y-6">
        <div class="flex justify-between items-center bg-white p-4 rounded shadow-sm">
            <h1 class="text-xl font-bold">客户管理系统</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-500">{{ session.user.email }}</span>
                <button @click="handleLogout" class="text-sm text-red-500 hover:underline">退出</button>
            </div>
        </div>

        <!-- 操作栏：搜索 + 新增 -->
        <div class="flex flex-col md:flex-row gap-4 justify-between">
            <input v-model="searchQuery" type="text" placeholder="搜索客户姓名或电话..." class="flex-1 p-3 border rounded shadow-sm focus:outline-none">
            <button @click="openModal()" class="bg-green-600 text-white px-6 py-3 rounded hover:bg-green-700 font-medium">
                + 新增客户
            </button>
        </div>

        <!-- 数据表格 -->
        <div class="bg-white rounded shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="p-4 font-medium">姓名</th>
                        <th class="p-4 font-medium">电话</th>
                        <th class="p-4 font-medium">状态</th>
                        <th class="p-4 font-medium text-right">操作</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <tr v-for="item in filteredList" :key="item.id" class="hover:bg-gray-50">
                        <td class="p-4">{{ item.name }}</td>
                        <td class="p-4">{{ item.phone }}</td>
                        <td class="p-4">
                            <span class="px-2 py-1 text-xs rounded" :class="item.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'">
                                {{ item.status === 'active' ? '活跃' : '停用' }}
                            </span>
                        </td>
                        <td class="p-4 text-right space-x-2">
                            <button @click="openModal(item)" class="text-blue-600 hover:underline text-sm">编辑</button>
                            <button @click="handleDelete(item)" class="text-red-500 hover:underline text-sm">删除</button>
                        </td>
                    </tr>
                    <tr v-if="filteredList.length === 0">
                        <td colspan="4" class="p-8 text-center text-gray-400">暂无数据</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 弹窗：新增/编辑 -->
        <div v-if="isModalOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-lg w-full max-w-md p-6">
                <h3 class="text-lg font-bold mb-4">{{ editingItem ? '编辑客户' : '新增客户' }}</h3>
                <div class="space-y-4">
                    <input v-model="form.name" type="text" placeholder="客户姓名" class="w-full p-3 border rounded">
                    <input v-model="form.phone" type="text" placeholder="联系电话" class="w-full p-3 border rounded">
                    <select v-model="form.status" class="w-full p-3 border rounded bg-white">
                        <option value="active">活跃</option>
                        <option value="inactive">停用</option>
                    </select>
                </div>
                <div class="flex gap-4 mt-6">
                    <button @click="isModalOpen = false" class="flex-1 p-3 border rounded hover:bg-gray-50">取消</button>
                    <button @click="handleSave" class="flex-1 p-3 bg-blue-600 text-white rounded hover:bg-blue-700">保存</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted } = Vue;

    // ==========================================
    // 请修改这里！填入你的 Supabase 信息
    // ==========================================
    const SUPABASE_URL = 'https://ylxzrpwqvlijpvschhgj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlseHpycHdxdmxpanB2c2NoaGdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTI4ODMsImV4cCI6MjA5MDgyODg4M30.AlBACmZHSzYHtCfpqRQbyxOIGUZV_tuClur8DJjSiFY';
    // ==========================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    createApp({
        setup() {
            const session = ref(null);
            const loading = ref(false);
            const errorMsg = ref('');
            const loginForm = ref({ email: '', password: '' });
            
            // 数据列表
            const customers = ref([]);
            const searchQuery = ref('');
            
            // 弹窗状态
            const isModalOpen = ref(false);
            const editingItem = ref(null);
            const form = ref({ name: '', phone: '', status: 'active' });

            // 计算属性：搜索过滤
            const filteredList = computed(() => {
                if (!searchQuery.value) return customers.value;
                const q = searchQuery.value.toLowerCase();
                return customers.value.filter(c => 
                    c.name.toLowerCase().includes(q) || 
                    c.phone.includes(q)
                );
            });

            // 检查登录状态
            onMounted(async () => {
                const { data: { session: currentSession } } = await supabase.auth.getSession();
                session.value = currentSession;
                if (currentSession) fetchData();

                // 监听登录状态变化
                supabase.auth.onAuthStateChange((_event, _session) => {
                    session.value = _session;
                    if (_session) fetchData();
                });
            });

            // 登录
            const handleLogin = async () => {
                loading.value = true;
                errorMsg.value = '';
                const { error } = await supabase.auth.signInWithPassword(loginForm.value);
                if (error) errorMsg.value = error.message;
                loading.value = false;
            };

            // 退出
            const handleLogout = async () => {
                await supabase.auth.signOut();
                customers.value = [];
            };

            // 获取数据
            const fetchData = async () => {
                const { data } = await supabase
                    .from('customers')
                    .select('*')
                    .order('created_at', { ascending: false });
                customers.value = data || [];
            };

            // 打开弹窗
            const openModal = (item = null) => {
                editingItem.value = item;
                if (item) {
                    form.value = { ...item }; // 复制数据
                } else {
                    form.value = { name: '', phone: '', status: 'active' };
                }
                isModalOpen.value = true;
            };

            // 保存数据
            const handleSave = async () => {
                if (editingItem.value) {
                    // 更新
                    await supabase
                        .from('customers')
                        .update(form.value)
                        .eq('id', editingItem.value.id);
                } else {
                    // 新增
                    await supabase
                        .from('customers')
                        .insert([form.value]);
                }
                isModalOpen.value = false;
                fetchData(); // 刷新列表
            };

            // 删除数据
            const handleDelete = async (item) => {
                if (!confirm('确定要删除 ' + item.name + ' 吗？')) return;
                await supabase.from('customers').delete().eq('id', item.id);
                fetchData();
            };

            return {
                session, loading, errorMsg, loginForm,
                customers, searchQuery, filteredList,
                isModalOpen, form,
                handleLogin, handleLogout, openModal, handleSave, handleDelete
            };
        }
    }).mount('#app');
</script>
</body>
</html>
