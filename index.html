<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设备管理系统</title>
  <!-- 固定引入，无重复、无报错 -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 表格滚动优化，适配多列 */
    .table-container {
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <!-- 所有内容必须放在#app内，Vue才会编译 -->
  <div id="app">
    <!-- 登录区域 -->
    <div v-if="!session" class="max-w-md mx-auto mt-20 p-6 border rounded-lg shadow">
      <h2 class="text-2xl font-bold mb-6 text-center">设备管理系统登录</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">邮箱</label>
          <input v-model="loginForm.email" type="email" class="w-full border rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">密码</label>
          <input v-model="loginForm.password" type="password" class="w-full border rounded px-3 py-2">
        </div>
        <button @click="handleLogin" :disabled="loading" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 disabled:bg-blue-300">
          {{ loading ? '登录中...' : '登录' }}
        </button>
        <p v-if="errorMsg" class="text-red-500 text-sm text-center">{{ errorMsg }}</p>
      </div>
    </div>

    <!-- 登录后的主界面 -->
    <div v-else class="max-w-7xl mx-auto p-6">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">设备管理系统</h1>
        <div class="flex items-center gap-4">
          <span>{{ session.user.email }}</span>
          <button @click="handleLogout" class="text-red-600 hover:underline">退出</button>
        </div>
      </div>

      <!-- 搜索+新增按钮 -->
      <div class="flex gap-4 mb-6">
        <input v-model="searchQuery" placeholder="模糊搜索：使用单位名称、设备代码、联系人、地址、街道、状态..." class="flex-1 border rounded px-3 py-2">
        <button @click="openModal()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">+ 新增设备</button>
      </div>

      <!-- 设备列表表格（支持横向滚动） -->
      <div class="border rounded-lg overflow-hidden table-container">
        <table class="w-full min-w-[1200px]">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="text-left py-3 px-4">使用单位名称</th>
              <th class="text-left py-3 px-4">设备代码</th>
              <th class="text-left py-3 px-4">联系人姓名</th>
              <th class="text-left py-3 px-4">使用单位地址</th>
              <th class="text-left py-3 px-4">街道</th>
              <th class="text-left py-3 px-4">设备使用状态</th>
              <th class="text-left py-3 px-4">操作</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="item in filteredList" :key="item.id" class="border-b hover:bg-gray-50">
              <td class="py-3 px-4">{{ item.使用单位名称 }}</td>
              <td class="py-3 px-4">{{ item.设备代码 }}</td>
              <td class="py-3 px-4">{{ item.联系人姓名 }}</td>
              <td class="py-3 px-4">{{ item.使用单位地址 }}</td>
              <td class="py-3 px-4">{{ item.街道 }}</td>
              <td class="py-3 px-4">{{ item.设备使用状态 }}</td>
              <td class="py-3 px-4 flex gap-3">
                <button @click="openModal(item)" class="text-blue-600 hover:underline">编辑</button>
                <button @click="handleDelete(item)" class="text-red-600 hover:underline">删除</button>
              </td>
            </tr>
            <tr v-if="filteredList.length === 0">
              <td colspan="7" class="py-8 text-center text-gray-500">暂无数据</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 新增/编辑弹窗 -->
      <div v-if="isModalOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-2xl">
          <h3 class="text-xl font-bold mb-4">{{ editingItem ? '编辑设备' : '新增设备' }}</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
              <label class="block text-sm font-medium mb-1">使用单位名称</label>
              <input v-model="form.使用单位名称" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">设备代码</label>
              <input v-model="form.设备代码" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">联系人姓名</label>
              <input v-model="form.联系人姓名" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">街道</label>
              <input v-model="form.街道" class="w-full border rounded px-3 py-2">
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium mb-1">使用单位地址</label>
              <input v-model="form.使用单位地址" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">设备使用状态</label>
              <input v-model="form.设备使用状态" class="w-full border rounded px-3 py-2" placeholder="如：在用、停用">
            </div>
          </div>
          <div class="flex gap-3 justify-end">
            <button @click="isModalOpen = false" class="border px-4 py-2 rounded hover:bg-gray-50">取消</button>
            <button @click="handleSave" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">保存</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 纯浏览器兼容JS，无任何CommonJS语法，彻底解决module报错 -->
  <script>
    // 解构Vue API
    const { createApp, ref, computed, onMounted } = Vue;

    // Supabase 配置（保持不变）
    const SUPABASE_URL = 'https://ylxzrpwqvlijpvschhgj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlseHpycHdxdmxpanB2c2NoaGdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTI4ODMsImV4cCI6MjA5MDgyODg4M30.AlBACmZHSzYHtCfpqRQbyxOIGUZV_tuClur8DJjSiFY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 创建Vue应用
    createApp({
      setup() {
        // 登录状态
        const session = ref(null);
        const loading = ref(false);
        const errorMsg = ref('');
        const loginForm = ref({ email: '', password: '' });
        
        // 设备数据
        const shebei = ref([]);
        const searchQuery = ref('');
        
        // 弹窗状态
        const isModalOpen = ref(false);
        const editingItem = ref(null);
        // 对应shebei表的字段
        const form = ref({
          使用单位名称: '',
          设备代码: '',
          联系人姓名: '',
          使用单位地址: '',
          街道: '',
          设备使用状态: '在用'
        });

        // 全字段模糊搜索
        const filteredList = computed(() => {
          if (!searchQuery.value) return shebei.value;
          const q = searchQuery.value.toLowerCase();
          return shebei.value.filter(item => {
            // 遍历所有字段，只要任意一个字段包含搜索词就匹配
            return Object.values(item).some(val => 
              val && String(val).toLowerCase().includes(q)
            );
          });
        });

        // 初始化登录检查
        onMounted(async () => {
          console.log('Vue 挂载成功');
          const { data: { session: currentSession } } = await supabase.auth.getSession();
          session.value = currentSession;
          if (currentSession) fetchData();

          // 监听登录状态变化
          supabase.auth.onAuthStateChange((_event, _session) => {
            session.value = _session;
            if (_session) fetchData();
          });
        });

        // 登录方法
        const handleLogin = async () => {
          loading.value = true;
          errorMsg.value = '';
          const { error } = await supabase.auth.signInWithPassword(loginForm.value);
          if (error) errorMsg.value = error.message;
          loading.value = false;
        };

        // 退出登录
        const handleLogout = async () => {
          await supabase.auth.signOut();
          shebei.value = [];
        };

        // 获取设备列表（从shebei表）
        const fetchData = async () => {
          const { data, error } = await supabase
            .from('shebei')
            .select('*')
            .order('id', { ascending: true });
          if (error) {
            console.error('数据获取失败：', error);
            alert('数据获取失败：' + error.message);
            return;
          }
          shebei.value = data || [];
        };

        // 打开弹窗
        const openModal = (item = null) => {
          editingItem.value = item;
          form.value = item ? { ...item } : {
            使用单位名称: '',
            设备代码: '',
            联系人姓名: '',
            使用单位地址: '',
            街道: '',
            设备使用状态: '在用'
          };
          isModalOpen.value = true;
        };

        // 保存设备数据
        const handleSave = async () => {
          // 基础校验
          if (!form.value.使用单位名称 || !form.value.设备代码) {
            alert('使用单位名称和设备代码为必填项！');
            return;
          }

          let error = null;
          if (editingItem.value) {
            // 编辑更新
            const res = await supabase
              .from('shebei')
              .update(form.value)
              .eq('id', editingItem.value.id);
            error = res.error;
          } else {
            // 新增插入
            const res = await supabase
              .from('shebei')
              .insert([form.value]);
            error = res.error;
          }
          if (error) {
            console.error('保存失败：', error);
            alert('保存失败：' + error.message);
            return;
          }
          // 保存成功，关闭弹窗刷新列表
          isModalOpen.value = false;
          fetchData();
        };

        // 删除设备
        const handleDelete = async (item) => {
          if (!confirm(`确定要删除 ${item.使用单位名称} 的设备（${item.设备代码}）吗？`)) return;
          const { error } = await supabase.from('shebei').delete().eq('id', item.id);
          if (error) {
            console.error('删除失败：', error);
            alert('删除失败：' + error.message);
            return;
          }
          fetchData();
        };

        return {
          session, loading, errorMsg, loginForm,
          shebei, searchQuery, filteredList,
          isModalOpen, editingItem, form,
          handleLogin, handleLogout, openModal, handleSave, handleDelete
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
